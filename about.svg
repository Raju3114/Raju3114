<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;family=Orbitron:wght@700;900&amp;family=Oxanium:wght@600;800&amp;display=swap');
      
      :root {
        --color-bg: #010103;
        --color-blue: #0066ff;
        --color-cyan: #00f0ff;
        --color-purple: #7a22ff;
        --color-text: #94a3b8;
        --color-bright: #ffffff;
      }
      
      .panel-bg {
        fill: var(--color-bg);
        stroke: rgba(0, 102, 255, 0.35);
        stroke-width: 1.5;
        filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.15));
      }

      .font-space-title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 16px;
        fill: var(--color-bright);
        letter-spacing: 1.5px;
        filter: drop-shadow(0 0 5px rgba(0, 240, 255, 0.3));
      }

      .text-base {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 15px;
        fill: var(--color-text);
      }

      .text-bright {
        font-family: 'Oxanium', sans-serif;
        font-weight: 800;
        font-size: 16px;
        fill: var(--color-bright);
      }

      .text-prompt {
        fill: var(--color-blue);
        font-weight: bold;
      }

      /* Animated text glow for all log statements */
      @keyframes wordGlow {
        0%, 100% { fill: #00c8ff; filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.2)); }
        50% { fill: #ffffff; filter: drop-shadow(0 0 8px var(--color-cyan)); }
      }
      .text-log {
        animation: wordGlow 4s ease-in-out infinite;
      }

      /* Staggered line animation */
      @keyframes linePulse {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
      .log-line-item {
        animation: linePulse 3s ease-in-out infinite;
      }

      /* Radar Sweep rotation */
      @keyframes radarRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .radar-line {
        transform-origin: 710px 160px;
        animation: radarRotate 4.5s linear infinite;
        stroke: var(--color-cyan);
        stroke-width: 1.8;
        filter: drop-shadow(0 0 6px var(--color-cyan));
      }

      /* Blinking dots on radar */
      @keyframes targetBlink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; filter: drop-shadow(0 0 4px var(--color-cyan)); }
      }
      .radar-target {
        animation: targetBlink 2s ease-in-out infinite;
      }

      /* Cursor Blinking */
      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .console-cursor {
        animation: cursorBlink 1s infinite;
        fill: var(--color-cyan);
        filter: drop-shadow(0 0 3px var(--color-cyan));
      }

      /* Floating stars */
      @keyframes starFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); opacity: 0.6; }
      }
      .star {
        animation: starFloat 5s ease-in-out infinite;
        fill: #ffffff;
      }
    </style>
  </defs>

  <!-- Panel border -->
  <rect width="850" height="320" rx="8" class="panel-bg" />

  <!-- Floating Background Stars -->
  <g opacity="0.4">
    <circle cx="60" cy="50" r="1.2" class="star" style="animation-delay: 0.5s;" />
    <circle cx="280" cy="40" r="1" class="star" style="animation-delay: 1.5s;" />
    <circle cx="450" cy="60" r="1.5" class="star" style="animation-delay: 2.2s;" />
    <circle cx="120" cy="280" r="1.2" class="star" style="animation-delay: 0.8s;" />
    <circle cx="390" cy="290" r="1" class="star" style="animation-delay: 1.8s;" />
    <circle cx="530" cy="270" r="1.2" class="star" style="animation-delay: 2.8s;" />
  </g>

  <!-- Section Title Header -->
  <text x="25" y="40" class="font-space-title">
    COSMIC_LOG // ENGINEERING_JOURNEY
  </text>
  <line x1="25" y1="52" x2="520" y2="52" stroke="rgba(0, 102, 255, 0.25)" stroke-width="1.2" />

  <!-- Left Side: Terminal Log lines (Bigger and Animated) -->
  <g transform="translate(25, 85)" class="text-base">
    <!-- Log 1 -->
    <g class="log-line-item" style="animation-delay: 0s;">
      <text y="0">
        <tspan class="text-prompt">raju@command:~$</tspan> cat log_2022.txt
      </text>
      <text y="24" class="text-log" style="animation-delay: 0s;">↳ Joined VIT AP (CS Foundations Loaded)</text>
    </g>
    
    <!-- Log 2 -->
    <g class="log-line-item" style="animation-delay: 0.5s;">
      <text y="60">
        <tspan class="text-prompt">raju@command:~$</tspan> cat log_2023.txt
      </text>
      <text y="84" class="text-log" style="animation-delay: 1s;">↳ Built Object-Oriented Java &amp; JDBC apps</text>
    </g>

    <!-- Log 3 -->
    <g class="log-line-item" style="animation-delay: 1s;">
      <text y="120">
        <tspan class="text-prompt">raju@command:~$</tspan> cat log_2024.txt
      </text>
      <text y="144" class="text-log" style="animation-delay: 2s;">↳ Built transaction-safe Bank Management Core</text>
    </g>

    <!-- Log 4 -->
    <g class="log-line-item" style="animation-delay: 1.5s;">
      <text y="180">
        <tspan class="text-prompt">raju@command:~$</tspan> tail log_2025.txt
      </text>
      <text y="204" class="text-log" style="animation-delay: 3s;">↳ Exploring scalable backend systems &amp; AI</text>
      <rect x="428" y="188" width="9" height="15" class="console-cursor" />
    </g>
  </g>

  <!-- Middle: Status Board -->
  <g transform="translate(535, 40)">
    <rect width="140" height="240" rx="6" fill="rgba(0, 102, 255, 0.04)" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1.2" />
    <text x="70" y="28" font-family="'Orbitron', sans-serif" font-size="13" font-weight="900" fill="var(--color-bright)" letter-spacing="1" text-anchor="middle">STATUS</text>
    <line x1="15" y1="38" x2="125" y2="38" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1" />
    
    <g transform="translate(15, 68)">
      <!-- Java -->
      <text y="0" class="text-bright">Java ☕</text>
      <text y="18" font-family="monospace" font-size="11" fill="var(--color-cyan)" font-weight="bold">[ONLINE]</text>
      
      <!-- Backend -->
      <text y="58" class="text-bright">Backend 🚀</text>
      <text y="76" font-family="monospace" font-size="11" fill="var(--color-cyan)" font-weight="bold">[ACTIVE]</text>

      <!-- DBMS -->
      <text y="116" class="text-bright">DBMS 🗄</text>
      <text y="134" font-family="monospace" font-size="11" fill="var(--color-cyan)" font-weight="bold">[ONLINE]</text>
    </g>
  </g>

  <!-- Right Side: Radar sweep display -->
  <g transform="translate(0, 30)">
    <!-- Radar circular grids -->
    <circle cx="760" cy="130" r="75" fill="rgba(0, 240, 255, 0.02)" stroke="rgba(0, 240, 255, 0.12)" stroke-width="1.2" />
    <circle cx="760" cy="130" r="50" fill="none" stroke="rgba(0, 240, 255, 0.08)" stroke-width="1" stroke-dasharray="3, 3" />
    <circle cx="760" cy="130" r="25" fill="none" stroke="rgba(0, 240, 255, 0.08)" stroke-width="1" />
    
    <!-- Crosshairs -->
    <line x1="685" y1="130" x2="835" y2="130" stroke="rgba(0, 240, 255, 0.12)" stroke-width="1" />
    <line x1="760" y1="55" x2="760" y2="205" stroke="rgba(0, 240, 255, 0.12)" stroke-width="1" />
    
    <!-- Radar detected targets (pulsing dots) -->
    <circle cx="725" cy="95" r="3" fill="var(--color-cyan)" class="radar-target" />
    <circle cx="795" cy="155" r="2.5" fill="var(--color-purple)" class="radar-target" style="animation-delay: 1s;" />
    <circle cx="750" cy="165" r="2" fill="var(--color-cyan)" class="radar-target" style="animation-delay: 0.5s;" />

    <!-- Sweeping Radar Line -->
    <line x1="760" y1="130" x2="760" y2="55" class="radar-line" />
    
    <!-- Radar coordinates overlay -->
    <text x="760" y="215" text-anchor="middle" font-family="'Fira Code', monospace" font-size="9" fill="#4d5f80">RADAR_SWEEP_SCAN</text>
  </g>
</svg>
