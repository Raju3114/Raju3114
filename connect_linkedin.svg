<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 100" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;family=Orbitron:wght@800;900&amp;family=Oxanium:wght@700&amp;display=swap');
      
      :root {
        --color-bg: #010103;
        --color-blue: #0066ff;
        --color-cyan: #00f0ff;
        --color-bright: #ffffff;
      }
      
      .btn-frame {
        fill: var(--color-bg);
        stroke: rgba(0, 240, 255, 0.25);
        stroke-width: 1.2;
        transition: stroke 0.3s;
      }
      
      .btn-frame:hover {
        stroke: var(--color-cyan);
      }

      .text-title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 12px;
        fill: var(--color-bright);
        letter-spacing: 1px;
      }
      
      .text-link {
        font-family: 'Fira Code', monospace;
        font-size: 10px;
        fill: #94a3b8;
        font-weight: 700;
      }

      /* Radar Sweep / Ripple animation */
      @keyframes radarRipple {
        0% { r: 12px; opacity: 0.6; }
        100% { r: 35px; opacity: 0; stroke-width: 0.8; }
      }
      .ripple {
        fill: none;
        stroke: var(--color-cyan);
        animation: radarRipple 2s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
      }
      
      @keyframes blinkDot {
        0%, 100% { fill: #00ff66; filter: drop-shadow(0 0 3px #00ff66); }
        50% { fill: #004411; filter: none; }
      }
      .conn-status {
        animation: blinkDot 1.5s infinite;
      }

      /* LinkedIn Brand Color Pulse */
      @keyframes brandPulse {
        0%, 100% { filter: drop-shadow(0 0 2px var(--color-blue)); }
        50% { filter: drop-shadow(0 0 6px var(--color-cyan)); }
      }
      .logo-bg {
        fill: var(--color-blue);
        animation: brandPulse 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Card Frame -->
  <rect width="410" height="100" rx="6" class="btn-frame" />

  <!-- Left Side: Circular radar & Logo -->
  <g transform="translate(0, 0)">
    <!-- Radar concentric rings -->
    <circle cx="55" cy="50" r="28" fill="none" stroke="rgba(0, 240, 255, 0.08)" stroke-width="0.8" />
    <circle cx="55" cy="50" r="20" fill="none" stroke="rgba(0, 240, 255, 0.12)" stroke-width="0.8" stroke-dasharray="2, 3" />
    
    <!-- Animating ripples -->
    <circle cx="55" cy="50" r="12" class="ripple" />
    <circle cx="55" cy="50" r="12" class="ripple" style="animation-delay: 1s;" />

    <!-- LinkedIn logo box -->
    <rect x="43" y="38" width="24" height="24" rx="4" class="logo-bg" />
    <!-- "in" text logo -->
    <text x="55" y="55" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">in</text>
  </g>

  <!-- Right Side: Details -->
  <g transform="translate(100, 38)">
    <text y="0" class="text-title">LINKEDIN // ESTABLISH_CONN</text>
    <text y="24" class="text-link">/in/raj-kumar-a74601252</text>
    
    <!-- Connection Status LED -->
    <g transform="translate(0, 42)">
      <circle cx="5" cy="-3" r="4.5" fill="#00ff66" class="conn-status" />
      <text x="15" y="1" font-family="'Fira Code', monospace" font-size="9" font-weight="700" fill="#00ff66">CONNECTED</text>
    </g>
  </g>
</svg>
