<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;family=Orbitron:wght@700;900&amp;family=Oxanium:wght@600;800&amp;display=swap');
      
      :root {
        --color-bg: #010103;
        --color-cyan: #00f0ff;
        --color-blue: #0066ff;
        --color-purple: #7a22ff;
        --color-bright: #ffffff;
      }
      
      .screen-bg {
        fill: var(--color-bg);
        stroke: rgba(0, 102, 255, 0.35);
        stroke-width: 1.5;
        filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.15));
      }

      .font-space-title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 16px;
        fill: var(--color-bright);
        letter-spacing: 1.5px;
        filter: drop-shadow(0 0 5px rgba(0, 240, 255, 0.3));
      }

      .arcade-text {
        font-family: 'Fira Code', monospace;
        font-size: 13px;
        font-weight: 700;
        fill: #94a3b8;
      }

      .score-glow {
        fill: var(--color-cyan);
        filter: drop-shadow(0 0 3px var(--color-cyan));
      }

      /* Starfield drift */
      @keyframes spaceDrift {
        from { transform: translate(0, 0); }
        to { transform: translate(-30px, 30px); }
      }
      .star-bg {
        animation: spaceDrift 4s linear infinite;
        fill: #ffffff;
      }

      /* Spaceship rotation keyframes aiming at targets */
      @keyframes shipRotate {
        0% { transform: rotate(0deg); }
        15%, 30% { transform: rotate(45deg); }     /* Aims at Top-Right Asteroid */
        40%, 55% { transform: rotate(-120deg); }   /* Aims at Bottom-Left Asteroid */
        65%, 80% { transform: rotate(210deg); }    /* Aims at Top-Left Asteroid */
        100% { transform: rotate(360deg); }        /* Completes full rotation */
      }
      .spaceship {
        transform-origin: 425px 180px;
        animation: shipRotate 8s linear infinite;
      }

      /* Laser vectors */
      @keyframes shootL1 {
        0%, 17% { stroke-dashoffset: 250; opacity: 0; }
        18% { opacity: 1; }
        21% { stroke-dashoffset: 0; opacity: 1; }
        22% { opacity: 0; }
        100% { opacity: 0; }
      }
      .laser-line-1 {
        stroke: var(--color-cyan);
        stroke-width: 3;
        filter: drop-shadow(0 0 4px var(--color-cyan));
        stroke-dasharray: 250;
        animation: shootL1 8s linear infinite;
      }

      @keyframes shootL2 {
        0%, 43% { stroke-dashoffset: 250; opacity: 0; }
        44% { opacity: 1; }
        47% { stroke-dashoffset: 0; opacity: 1; }
        48% { opacity: 0; }
        100% { opacity: 0; }
      }
      .laser-line-2 {
        stroke: var(--color-cyan);
        stroke-width: 3;
        filter: drop-shadow(0 0 4px var(--color-cyan));
        stroke-dasharray: 250;
        animation: shootL2 8s linear infinite;
      }

      @keyframes shootL3 {
        0%, 67% { stroke-dashoffset: 250; opacity: 0; }
        68% { opacity: 1; }
        71% { stroke-dashoffset: 0; opacity: 1; }
        72% { opacity: 0; }
        100% { opacity: 0; }
      }
      .laser-line-3 {
        stroke: var(--color-cyan);
        stroke-width: 3;
        filter: drop-shadow(0 0 4px var(--color-cyan));
        stroke-dasharray: 250;
        animation: shootL3 8s linear infinite;
      }

      /* Asteroid explosion animations */
      @keyframes ast1Anim {
        0%, 21% { opacity: 1; transform: scale(1); }
        22% { opacity: 0.8; transform: scale(1.3); filter: brightness(2); }
        23% { opacity: 0; transform: scale(0); }
        90% { opacity: 0; }
        95% { opacity: 0.2; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }
      .ast-1 {
        animation: ast1Anim 8s linear infinite;
        transform-origin: 580px 85px;
        fill: #3e4450;
        stroke: rgba(0, 240, 255, 0.4);
      }

      @keyframes ast2Anim {
        0%, 47% { opacity: 1; transform: scale(1); }
        48% { opacity: 0.8; transform: scale(1.3); filter: brightness(2); }
        49% { opacity: 0; transform: scale(0); }
        90% { opacity: 0; }
        95% { opacity: 0.2; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }
      .ast-2 {
        animation: ast2Anim 8s linear infinite;
        transform-origin: 290px 260px;
        fill: #3e4450;
        stroke: rgba(0, 240, 255, 0.4);
      }

      @keyframes ast3Anim {
        0%, 71% { opacity: 1; transform: scale(1); }
        72% { opacity: 0.8; transform: scale(1.3); filter: brightness(2); }
        73% { opacity: 0; transform: scale(0); }
        90% { opacity: 0; }
        95% { opacity: 0.2; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }
      .ast-3 {
        animation: ast3Anim 8s linear infinite;
        transform-origin: 250px 110px;
        fill: #3e4450;
        stroke: rgba(0, 240, 255, 0.4);
      }

      /* Debris particle explosions */
      @keyframes debrisBurst1 {
        0%, 21% { opacity: 0; transform: translate(0, 0); }
        22% { opacity: 1; }
        30% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
        100% { opacity: 0; }
      }
      .deb-1 { animation: debrisBurst1 8s linear infinite; }

      @keyframes debrisBurst2 {
        0%, 47% { opacity: 0; transform: translate(0, 0); }
        48% { opacity: 1; }
        56% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
        100% { opacity: 0; }
      }
      .deb-2 { animation: debrisBurst2 8s linear infinite; }

      @keyframes debrisBurst3 {
        0%, 71% { opacity: 0; transform: translate(0, 0); }
        72% { opacity: 1; }
        80% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
        100% { opacity: 0; }
      }
      .deb-3 { animation: debrisBurst3 8s linear infinite; }

      /* Dynamic Score Swap Keyframes */
      @keyframes score1 {
        0%, 21% { opacity: 1; }
        22%, 100% { opacity: 0; }
      }
      @keyframes score2 {
        0%, 21% { opacity: 0; }
        22%, 47% { opacity: 1; }
        48%, 100% { opacity: 0; }
      }
      @keyframes score3 {
        0%, 47% { opacity: 0; }
        48%, 100% { opacity: 1; }
      }
      .sc-p1 { animation: score1 8s linear infinite; }
      .sc-p2 { animation: score2 8s linear infinite; }
      .sc-p3 { animation: score3 8s linear infinite; }
    </style>
  </defs>

  <!-- Panel Core -->
  <rect width="850" height="320" rx="8" class="screen-bg" />

  <!-- Drift stars background -->
  <g opacity="0.3">
    <circle cx="80" cy="50" r="1.2" class="star-bg" />
    <circle cx="210" cy="220" r="0.8" class="star-bg" />
    <circle cx="490" cy="40" r="1.5" class="star-bg" />
    <circle cx="680" cy="280" r="1.2" class="star-bg" />
    <circle cx="150" cy="180" r="1" class="star-bg" />
    <circle cx="790" cy="110" r="1" class="star-bg" />
  </g>

  <!-- Header Dashboard Information (Bigger text) -->
  <g transform="translate(25, 38)" class="arcade-text">
    <text x="0" y="0" font-family="'Orbitron', sans-serif" font-size="13">SYS_SIM // <tspan class="score-glow">ASTEROIDS_DEFENSE</tspan></text>
    
    <!-- Score Swapper -->
    <text x="320" y="0" font-family="'Orbitron', sans-serif" font-size="13">
      SCORE: 
      <tspan class="sc-p1 score-glow">03114</tspan>
      <tspan class="sc-p2 score-glow" dx="-48">04250</tspan>
      <tspan class="sc-p3 score-glow" dx="-48">05680</tspan>
    </text>
    
    <text x="590" y="0" font-family="'Orbitron', sans-serif" font-size="13">SYSTEM: <tspan fill="#ffffff">TACTICAL_RADAR</tspan></text>
  </g>
  <line x1="25" y1="52" x2="825" y2="52" stroke="rgba(0, 102, 255, 0.25)" stroke-width="1.2" />

  <!-- Radar tactical coordinates background overlay -->
  <g fill="none" stroke="rgba(0, 102, 255, 0.08)" stroke-width="1">
    <circle cx="425" cy="180" r="110" />
    <circle cx="425" cy="180" r="80" stroke-dasharray="4, 4" />
    <circle cx="425" cy="180" r="50" />
    <line x1="305" y1="180" x2="545" y2="180" />
    <line x1="425" y1="65" x2="425" y2="295" />
  </g>

  <!-- Firing lasers -->
  <line x1="425" y1="180" x2="580" y2="85" class="laser-line-1" />
  <line x1="425" y1="180" x2="290" y2="260" class="laser-line-2" />
  <line x1="425" y1="180" x2="250" y2="110" class="laser-line-3" />

  <!-- Targets: Asteroids (Polygonal vectors) -->
  <!-- Asteroid 1 (Top-Right) -->
  <polygon points="575,70 595,75 590,95 570,95 565,80" class="ast-1" stroke-width="1.2" />
  <g transform="translate(580, 85)" fill="var(--color-cyan)">
    <circle cx="0" cy="0" r="2" class="deb-1" style="--tx: 15px; --ty: -15px;" />
    <circle cx="0" cy="0" r="1.5" class="deb-1" style="--tx: -18px; --ty: 12px;" />
    <circle cx="0" cy="0" r="2.5" class="deb-1" style="--tx: 10px; --ty: 18px;" />
    <circle cx="0" cy="0" r="2" class="deb-1" style="--tx: -15px; --ty: -15px;" />
  </g>

  <!-- Asteroid 2 (Bottom-Left) -->
  <polygon points="280,245 300,250 295,270 280,270 275,255" class="ast-2" stroke-width="1.2" />
  <g transform="translate(290, 260)" fill="var(--color-cyan)">
    <circle cx="0" cy="0" r="2" class="deb-2" style="--tx: -15px; --ty: -12px;" />
    <circle cx="0" cy="0" r="1.5" class="deb-2" style="--tx: 18px; --ty: 15px;" />
    <circle cx="0" cy="0" r="2.5" class="deb-2" style="--tx: -10px; --ty: 18px;" />
    <circle cx="0" cy="0" r="2" class="deb-2" style="--tx: 15px; --ty: -15px;" />
  </g>

  <!-- Asteroid 3 (Top-Left) -->
  <polygon points="240,95 260,100 255,120 240,120 235,105" class="ast-3" stroke-width="1.2" />
  <g transform="translate(250, 110)" fill="var(--color-cyan)">
    <circle cx="0" cy="0" r="2" class="deb-3" style="--tx: -12px; --ty: -18px;" />
    <circle cx="0" cy="0" r="1.5" class="deb-3" style="--tx: 18px; --ty: -10px;" />
    <circle cx="0" cy="0" r="2.5" class="deb-3" style="--tx: -15px; --ty: 15px;" />
    <circle cx="0" cy="0" r="2" class="deb-3" style="--tx: 12px; --ty: 18px;" />
  </g>

  <!-- Spaceship at core grid (aiming by rotation) -->
  <g class="spaceship">
    <g transform="translate(425, 180)">
      <!-- Thruster fire -->
      <path d="M -5 10 L 0 18 L 5 10 Z" fill="var(--color-cyan)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="0.15s" repeatCount="indefinite" />
      </path>
      <!-- Ship hulls -->
      <path d="M 0 -16 L -12 10 L -4 8 L 0 4 L 4 8 L 12 10 Z" fill="#ffffff" stroke="var(--color-blue)" stroke-width="1.2" filter="drop-shadow(0 0 3px var(--color-blue))" />
      <!-- Cockpit -->
      <circle cx="0" cy="-2" r="3" fill="var(--color-cyan)" />
    </g>
  </g>
</svg>
