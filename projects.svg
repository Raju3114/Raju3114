<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 340" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;family=Space+Grotesk:wght@700&amp;display=swap');
      
      :root {
        --color-bg: #010103;
        --color-blue: #0066ff;
        --color-cyan: #00f0ff;
        --color-purple: #7a22ff;
        --color-bright: #ffffff;
      }
      
      .panel-frame {
        fill: var(--color-bg);
        stroke: rgba(0, 102, 255, 0.25);
        stroke-width: 1.2;
      }
      
      .text-heading {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 14px;
        fill: var(--color-bright);
        letter-spacing: 0.5px;
      }
      
      .text-node {
        font-family: 'Fira Code', monospace;
        font-size: 11px;
        font-weight: 700;
        fill: var(--color-bright);
        text-anchor: middle;
      }

      .text-desc {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 11px;
        fill: #607090;
      }
      
      .flow-line {
        stroke: rgba(0, 102, 255, 0.3);
        stroke-width: 1.5;
        stroke-dasharray: 4, 4;
      }
      
      /* Glowing packet animation */
      @keyframes packetFlow {
        0% { cy: 75px; opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { cy: 235px; opacity: 0; }
      }
      .packet {
        fill: var(--color-cyan);
        animation: packetFlow 3s linear infinite;
        filter: drop-shadow(0 0 4px var(--color-cyan));
      }
      
      .packet-delay {
        fill: var(--color-cyan);
        animation: packetFlow 3s linear infinite;
        animation-delay: 1.5s;
        filter: drop-shadow(0 0 4px var(--color-cyan));
      }

      /* Rotating architecture gears/dials */
      @keyframes spinGear {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .gear-spin {
        transform-origin: 640px 150px;
        animation: spinGear 30s linear infinite;
      }
      .gear-spin-reverse {
        transform-origin: 640px 150px;
        animation: spinGear 20s linear infinite reverse;
      }

      /* Glowing data streams */
      @keyframes pulseNode {
        0%, 100% { stroke: rgba(0, 240, 255, 0.3); r: 20; }
        50% { stroke: rgba(0, 240, 255, 0.8); r: 23; filter: drop-shadow(0 0 3px var(--color-cyan)); }
      }
      .network-core {
        animation: pulseNode 3s ease-in-out infinite;
      }
      
      /* Staggered entry glows for layers */
      .layer-block {
        fill: rgba(0, 102, 255, 0.04);
        stroke: rgba(0, 102, 255, 0.15);
        stroke-width: 1;
        transition: stroke 0.3s;
      }
      .layer-block:hover {
        stroke: var(--color-cyan);
        fill: rgba(0, 240, 255, 0.02);
      }
    </style>
  </defs>

  <!-- Panel Core -->
  <rect width="850" height="340" rx="8" class="panel-frame" />

  <!-- Section Title -->
  <text x="25" y="35" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="14" fill="var(--color-bright)" letter-spacing="1">
    SYS_PORTFOLIO // MISSION_ARCHITECTURES
  </text>
  <line x1="25" y1="45" x2="825" y2="45" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1" />

  <!-- LEFT PANEL: Bank Management System Pipeline -->
  <g transform="translate(0, 0)">
    <rect x="25" y="65" width="370" height="250" rx="6" class="layer-block" />
    <text x="45" y="90" class="text-heading">🏦 BANK MANAGEMENT PIPELINE</text>
    <text x="45" y="105" class="text-desc">Transaction flow with safe multi-thread balances</text>
    
    <!-- Flow Connector Lines -->
    <line x1="205" y1="120" x2="205" y2="280" class="flow-line" />
    
    <!-- Animated sliding packets -->
    <circle cx="205" cy="75" r="4" class="packet" />
    <circle cx="205" cy="75" r="4" class="packet-delay" />

    <!-- Diagram Nodes -->
    <!-- Node 1: User -->
    <g transform="translate(205, 130)">
      <rect x="-55" y="-12" width="110" height="24" rx="4" fill="#010103" stroke="var(--color-blue)" stroke-width="1.2" />
      <text y="4" class="text-node">USER_INTERFACE</text>
    </g>

    <!-- Node 2: REST API -->
    <g transform="translate(205, 170)">
      <rect x="-45" y="-12" width="90" height="24" rx="4" fill="#010103" stroke="var(--color-cyan)" stroke-width="1.2" />
      <text y="4" class="text-node">REST_APIs</text>
    </g>

    <!-- Node 3: Java Server -->
    <g transform="translate(205, 210)">
      <rect x="-65" y="-12" width="130" height="24" rx="4" fill="#010103" stroke="var(--color-blue)" stroke-width="1.2" />
      <text y="4" class="text-node">JAVA_17_ENGINE</text>
    </g>

    <!-- Node 4: DAO -->
    <g transform="translate(205, 250)">
      <rect x="-40" y="-12" width="80" height="24" rx="4" fill="#010103" stroke="var(--color-cyan)" stroke-width="1.2" />
      <text y="4" class="text-node">DAO_LAYER</text>
    </g>

    <!-- Node 5: MySQL -->
    <g transform="translate(205, 290)">
      <rect x="-50" y="-12" width="100" height="24" rx="4" fill="#010103" stroke="var(--color-blue)" stroke-width="1.2" />
      <text y="4" class="text-node">MYSQL_DATABASE</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Software Engineering Architectures -->
  <g transform="translate(0, 0)">
    <rect x="455" y="65" width="370" height="250" rx="6" class="layer-block" />
    <text x="475" y="90" class="text-heading">⚙️ LAYERED CLOUD SYSTEMS</text>
    <text x="475" y="105" class="text-desc">High-scale distributed nodes &amp; database schemas</text>

    <!-- Concentric Architecture Dials -->
    <g class="gear-spin">
      <circle cx="640" cy="190" r="70" fill="none" stroke="rgba(0, 102, 255, 0.15)" stroke-width="1.2" stroke-dasharray="8, 12" />
      <circle cx="640" cy="190" r="50" fill="none" stroke="rgba(0, 240, 255, 0.1)" stroke-width="0.8" stroke-dasharray="3, 5" />
    </g>
    <g class="gear-spin-reverse">
      <circle cx="640" cy="190" r="60" fill="none" stroke="rgba(122, 34, 255, 0.15)" stroke-width="1.2" stroke-dasharray="5, 15" />
      <circle cx="640" cy="190" r="35" fill="none" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1" stroke-dasharray="2, 4" />
    </g>
    
    <!-- Central Cluster Core -->
    <circle cx="640" cy="190" r="20" fill="#010103" stroke="rgba(0, 240, 255, 0.3)" stroke-width="2" class="network-core" />
    <text x="640" y="194" class="text-node" font-size="9" fill="var(--color-cyan)">DBMS</text>

    <!-- Cluster nodes orbiting -->
    <g transform="translate(640, 190)">
      <!-- Node A -->
      <circle cx="-50" cy="-50" r="10" fill="#010103" stroke="var(--color-blue)" stroke-width="1" />
      <line x1="0" y1="0" x2="-50" y2="-50" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1" />
      <text x="-50" y="-65" class="text-node" font-size="8" fill="#ffffff">API_GATEWAY</text>

      <!-- Node B -->
      <circle cx="60" cy="-30" r="10" fill="#010103" stroke="var(--color-purple)" stroke-width="1" />
      <line x1="0" y1="0" x2="60" y2="-30" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1" />
      <text x="60" y="-45" class="text-node" font-size="8" fill="#ffffff">REACTIVE_BUS</text>

      <!-- Node C -->
      <circle cx="-20" cy="65" r="10" fill="#010103" stroke="var(--color-cyan)" stroke-width="1" />
      <line x1="0" y1="0" x2="-20" y2="65" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1" />
      <text x="-20" y="82" class="text-node" font-size="8" fill="#ffffff">WORKER_THREAD</text>
    </g>
  </g>
</svg>
