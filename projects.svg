<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;family=Orbitron:wght@700;900&amp;family=Oxanium:wght@600;800&amp;display=swap');
      
      :root {
        --color-bg: #010103;
        --color-blue: #0066ff;
        --color-cyan: #00f0ff;
        --color-purple: #7a22ff;
        --color-bright: #ffffff;
      }
      
      .panel-frame {
        fill: var(--color-bg);
        stroke: rgba(0, 102, 255, 0.35);
        stroke-width: 1.5;
        filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.15));
      }
      
      .font-space-title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 16px;
        fill: var(--color-bright);
        letter-spacing: 1.5px;
        filter: drop-shadow(0 0 5px rgba(0, 240, 255, 0.3));
      }

      .text-heading {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: var(--color-bright);
        letter-spacing: 0.5px;
        filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.2));
      }
      
      .text-node {
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        font-weight: 700;
        fill: var(--color-bright);
        text-anchor: middle;
      }

      .text-desc {
        font-family: 'Oxanium', sans-serif;
        font-size: 12px;
        fill: #607090;
        font-weight: 600;
      }
      
      .flow-line {
        stroke: rgba(0, 102, 255, 0.3);
        stroke-width: 1.8;
        stroke-dasharray: 4, 4;
      }
      
      /* Glowing packet animation */
      @keyframes packetFlow {
        0% { cy: 85px; opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { cy: 285px; opacity: 0; }
      }
      .packet {
        fill: var(--color-cyan);
        animation: packetFlow 2.8s linear infinite;
        filter: drop-shadow(0 0 4px var(--color-cyan));
      }
      
      .packet-delay {
        fill: var(--color-cyan);
        animation: packetFlow 2.8s linear infinite;
        animation-delay: 1.4s;
        filter: drop-shadow(0 0 4px var(--color-cyan));
      }

      /* Rotating architecture gears/dials */
      @keyframes spinGear {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .gear-spin {
        transform-origin: 640px 200px;
        animation: spinGear 30s linear infinite;
      }
      .gear-spin-reverse {
        transform-origin: 640px 200px;
        animation: spinGear 20s linear infinite reverse;
      }

      /* Glowing data streams */
      @keyframes pulseNode {
        0%, 100% { stroke: rgba(0, 240, 255, 0.3); r: 24; }
        50% { stroke: rgba(0, 240, 255, 0.8); r: 28; filter: drop-shadow(0 0 4px var(--color-cyan)); }
      }
      .network-core {
        animation: pulseNode 3s ease-in-out infinite;
      }
      
      .layer-block {
        fill: rgba(0, 102, 255, 0.04);
        stroke: rgba(0, 102, 255, 0.2);
        stroke-width: 1.2;
        transition: stroke 0.3s, fill 0.3s;
      }
      .layer-block:hover {
        stroke: var(--color-cyan);
        fill: rgba(0, 240, 255, 0.02);
      }

      /* Heading Pulsing */
      @keyframes headerGlow {
        0%, 100% { fill: var(--color-bright); }
        50% { fill: var(--color-cyan); filter: drop-shadow(0 0 5px var(--color-cyan)); }
      }
      .heading-glow-anim {
        animation: headerGlow 4s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Panel Core -->
  <rect width="850" height="400" rx="8" class="panel-frame" />

  <!-- Section Title -->
  <text x="25" y="40" class="font-space-title">
    SYS_PORTFOLIO // MISSION_ARCHITECTURES
  </text>
  <line x1="25" y1="52" x2="825" y2="52" stroke="rgba(0, 102, 255, 0.25)" stroke-width="1.2" />

  <!-- LEFT PANEL: Bank Management System Pipeline -->
  <g transform="translate(0, 15)">
    <rect x="25" y="65" width="370" height="290" rx="6" class="layer-block" />
    <text x="45" y="92" class="text-heading heading-glow-anim">🏦 BANK MANAGEMENT PIPELINE</text>
    <text x="45" y="110" class="text-desc">Transaction flow with safe multi-thread balances</text>
    
    <!-- Flow Connector Lines -->
    <line x1="205" y1="130" x2="205" y2="330" class="flow-line" />
    
    <!-- Animated sliding packets -->
    <circle cx="205" cy="85" r="4.5" class="packet" />
    <circle cx="205" cy="85" r="4.5" class="packet-delay" />

    <!-- Diagram Nodes (Larger & Monospace) -->
    <!-- Node 1: User -->
    <g transform="translate(205, 140)">
      <rect x="-65" y="-14" width="130" height="28" rx="4" fill="#010103" stroke="var(--color-blue)" stroke-width="1.2" />
      <text y="5" class="text-node">USER_INTERFACE</text>
    </g>

    <!-- Node 2: REST API -->
    <g transform="translate(205, 190)">
      <rect x="-55" y="-14" width="110" height="28" rx="4" fill="#010103" stroke="var(--color-cyan)" stroke-width="1.2" />
      <text y="5" class="text-node">REST_APIs</text>
    </g>

    <!-- Node 3: Java Server -->
    <g transform="translate(205, 240)">
      <rect x="-75" y="-14" width="150" height="28" rx="4" fill="#010103" stroke="var(--color-blue)" stroke-width="1.2" />
      <text y="5" class="text-node">JAVA_17_ENGINE</text>
    </g>

    <!-- Node 4: DAO -->
    <g transform="translate(205, 290)">
      <rect x="-50" y="-14" width="100" height="28" rx="4" fill="#010103" stroke="var(--color-cyan)" stroke-width="1.2" />
      <text y="5" class="text-node">DAO_LAYER</text>
    </g>

    <!-- Node 5: MySQL -->
    <g transform="translate(205, 340)">
      <rect x="-60" y="-14" width="120" height="28" rx="4" fill="#010103" stroke="var(--color-blue)" stroke-width="1.2" />
      <text y="5" class="text-node">MYSQL_DATABASE</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Software Engineering Architectures -->
  <g transform="translate(0, 15)">
    <rect x="455" y="65" width="370" height="290" rx="6" class="layer-block" />
    <text x="475" y="92" class="text-heading heading-glow-anim" style="animation-delay: 2s;">⚙️ LAYERED CLOUD SYSTEMS</text>
    <text x="475" y="110" class="text-desc">High-scale distributed nodes &amp; database schemas</text>

    <!-- Concentric Architecture Dials (Larger) -->
    <g class="gear-spin">
      <circle cx="640" cy="200" r="75" fill="none" stroke="rgba(0, 102, 255, 0.15)" stroke-width="1.2" stroke-dasharray="8, 12" />
      <circle cx="640" cy="200" r="55" fill="none" stroke="rgba(0, 240, 255, 0.1)" stroke-width="0.8" stroke-dasharray="3, 5" />
    </g>
    <g class="gear-spin-reverse">
      <circle cx="640" cy="200" r="65" fill="none" stroke="rgba(122, 34, 255, 0.15)" stroke-width="1.2" stroke-dasharray="5, 15" />
      <circle cx="640" cy="200" r="40" fill="none" stroke="rgba(0, 102, 255, 0.2)" stroke-width="1" stroke-dasharray="2, 4" />
    </g>
    
    <!-- Central Cluster Core -->
    <circle cx="640" cy="200" r="24" fill="#010103" stroke="rgba(0, 240, 255, 0.3)" stroke-width="2.5" class="network-core" />
    <text x="640" y="204" class="text-node" font-size="10" fill="var(--color-cyan)">DBMS</text>

    <!-- Cluster nodes orbiting -->
    <g transform="translate(640, 200)">
      <!-- Node A -->
      <circle cx="-55" cy="-55" r="12" fill="#010103" stroke="var(--color-blue)" stroke-width="1.2" />
      <line x1="0" y1="0" x2="-55" y2="-55" stroke="rgba(0, 102, 255, 0.25)" stroke-width="1.2" />
      <text x="-55" y="-72" class="text-node" font-size="9" fill="#ffffff">API_GATEWAY</text>

      <!-- Node B -->
      <circle cx="65" cy="-35" r="12" fill="#010103" stroke="var(--color-purple)" stroke-width="1.2" />
      <line x1="0" y1="0" x2="65" y2="-35" stroke="rgba(0, 102, 255, 0.25)" stroke-width="1.2" />
      <text x="65" y="-52" class="text-node" font-size="9" fill="#ffffff">REACTIVE_BUS</text>

      <!-- Node C -->
      <circle cx="-25" cy="70" r="12" fill="#010103" stroke="var(--color-cyan)" stroke-width="1.2" />
      <line x1="0" y1="0" x2="-25" y2="70" stroke="rgba(0, 102, 255, 0.25)" stroke-width="1.2" />
      <text x="-25" y="89" class="text-node" font-size="9" fill="#ffffff">WORKER_THREAD</text>
    </g>
  </g>
</svg>
